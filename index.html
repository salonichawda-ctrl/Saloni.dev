<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Name</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 60px;
    }

    img {
      width: 100px;
      border-radius: 50%;
      border: 3px solid #ff4d4d;
    }

    h1 {
      margin: 10px 0;
    }

    .btn {
      display: block;
      width: 220px;
      margin: 12px auto;
      padding: 14px;
      border-radius: 12px;
      background: #ff4d4d;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff1a1a;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="your-image.jpg" alt="profile">
    <h1>Your Name</h1>

    <a class="btn" href="#">Instagram</a>
    <a class="btn" href="#">YouTube</a>
    <a class="btn" href="#">Telegram</a>
  </div>
</body>
</html>
